apiVersion: apps/v1
kind: Deployment
metadata:
  name: leonel-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leonel-app
  template:
    metadata:
      labels:
        app: leonel-app
    spec:
      containers:
      - name: app
        image: nginx
        ports:
        - containerPort: 80
